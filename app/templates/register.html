{% extends "base.html" %}
{% block content %}

<section class="login-section">
    <div class="login-card">

        <div class="login-icon">
            👤
        </div>

        <h2>Daftar Akun</h2>
        <p class="login-subtitle">Buat akun baru untuk mengakses layanan</p>

        {% if error %}
        <div class="alert-box error">
            <span class="alert-icon">⚠️</span>
            <span class="alert-message">{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" action="/register" id="registerForm">

            <label for="nik">NIK</label>
            <input 
                type="text" 
                id="nik"
                name="nik"
                placeholder="Masukkan 16 digit NIK"
                maxlength="16"
                pattern="\d{16}"
                title="NIK harus terdiri dari 16 digit angka"
                required
            >
            <small id="nikWarning" class="warning-text" style="display:block; margin-top:4px;"></small>

            <label for="nama">Nama Lengkap</label>
            <input 
                type="text" 
                id="nama"
                name="nama"
                placeholder="Masukkan nama lengkap"
                required
            >

            <label for="email">Email</label>
            <input 
                type="email" 
                id="email"
                name="email"
                placeholder="nama@email.com"
                required
            >

            <!-- PASSWORD -->
            <label for="password">Password</label>
            <div class="password-box">
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Minimal 6 karakter"
                    minlength="6"
                    required
                >
                <span class="show-password" onclick="togglePassword()" id="eyeIcon">
                    <svg id="iconShow" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                    <svg id="iconHide" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                        <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                </span>
            </div>
            <small id="passwordWarning" class="warning-text" style="display:block; margin-top:4px;"></small>

            <!-- KONFIRMASI PASSWORD -->
            <label for="confirm_password">Konfirmasi Password</label>
            <div class="password-box">
                <input
                    type="password"
                    id="confirm_password"
                    name="confirm_password"
                    placeholder="Ulangi password"
                    minlength="6"
                    required
                >
                <span class="show-password" onclick="toggleConfirmPassword()" id="eyeIconConfirm">
                    <svg id="iconShowConfirm" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                    <svg id="iconHideConfirm" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                        <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                </span>
            </div>
            <small id="confirmPasswordWarning" class="warning-text" style="display:block; margin-top:4px;"></small>

            <button type="submit" class="btn-login">Daftar</button>
        </form>

        <p class="register-link">
            Sudah punya akun?
            <a href="/login">Masuk</a>
        </p>

    </div>
</section>

<!-- JAVASCRIPT VALIDATION -->
<script>
// ==========================
// SHOW / HIDE PASSWORD
// ==========================
function togglePassword() {
    const password = document.getElementById("password");
    const iconShow = document.getElementById("iconShow");
    const iconHide = document.getElementById("iconHide");

    if (password.type === "password") {
        password.type = "text";
        iconShow.style.display = "none";
        iconHide.style.display = "block";
    } else {
        password.type = "password";
        iconShow.style.display = "block";
        iconHide.style.display = "none";
    }
}

function toggleConfirmPassword() {
    const confirmPassword = document.getElementById("confirm_password");
    const iconShow = document.getElementById("iconShowConfirm");
    const iconHide = document.getElementById("iconHideConfirm");

    if (confirmPassword.type === "password") {
        confirmPassword.type = "text";
        iconShow.style.display = "none";
        iconHide.style.display = "block";
    } else {
        confirmPassword.type = "password";
        iconShow.style.display = "block";
        iconHide.style.display = "none";
    }
}

// ==========================
// VALIDASI LIVE
// ==========================
const nikInput = document.getElementById("nik");
const passwordInput = document.getElementById("password");
const confirmPasswordInput = document.getElementById("confirm_password");
const registerForm = document.getElementById("registerForm");

nikInput.addEventListener("input", function () {
    this.value = this.value.replace(/\D/g, ''); // Hanya angka
    const warning = document.getElementById("nikWarning");
    if (this.value.length === 0) {
        warning.innerText = "";
    } else if (this.value.length < 16) {
        warning.innerText = "NIK harus terdiri dari 16 digit angka";
    } else {
        warning.innerText = "";
    }
});

passwordInput.addEventListener("input", function () {
    const warning = document.getElementById("passwordWarning");
    if (this.value.length === 0) {
        warning.innerText = "";
    } else if (this.value.length < 6) {
        warning.innerText = "Password minimal 6 karakter";
    } else {
        warning.innerText = "";
    }
    
    // Validasi kecocokan saat password utama berubah
    validateMatch();
});

confirmPasswordInput.addEventListener("input", validateMatch);

function validateMatch() {
    const warning = document.getElementById("confirmPasswordWarning");
    if (confirmPasswordInput.value !== passwordInput.value && confirmPasswordInput.value.length > 0) {
        warning.innerText = "Konfirmasi password tidak cocok";
    } else {
        warning.innerText = "";
    }
}

// Mencegah submit jika validasi tidak lolos
registerForm.addEventListener("submit", function (e) {
    if (nikInput.value.length !== 16) {
        e.preventDefault();
        alert("Harap periksa kembali NIK Anda. NIK harus terdiri dari 16 digit.");
        return;
    }
    if (passwordInput.value.length < 6) {
        e.preventDefault();
        alert("Password minimal harus terdiri dari 6 karakter.");
        return;
    }
    if (confirmPasswordInput.value !== passwordInput.value) {
        e.preventDefault();
        alert("Konfirmasi password tidak cocok.");
        return;
    }
});
</script>
{% endblock %}
